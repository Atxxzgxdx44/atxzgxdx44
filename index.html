<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EE404INFXXZ</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #0d0d0d, #111827, #000814);
      color: white;
      overflow: hidden;
    }

    /* Top-left logo */
    .logo {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s linear infinite;
    }

    @keyframes glow {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* Center content */
    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    .center h1 {
      font-size: 55px;
      background: linear-gradient(90deg, cyan, magenta, yellow);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: float 3s ease-in-out infinite;
    }

    .center p {
      font-size: 18px;
      opacity: 0.8;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <!-- Logo -->
  <div class="logo">
    EE404INFXXZ • SYSTEM ONLINE
  </div>

  <!-- Main content -->
  <div class="center">
    <h1>WELCOME</h1>
    <p>System initialized successfully</p>
    <p>Connection stable • Access granted • Running smooth</p>
  </div>

  <!-- Footer -->
  <div class="footer">
    © 2026 EE404INFXXZ | All systems operational
  </div>

</body>
</html>
