<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Web Sitem</title>
    <style>
        /* CSS: Tasarım ve Renkler */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Selam, Ben [İsmin]!</h1>
        <p>Web geliştirme dünyasına ilk adımımı attım. Bu benim ilk web sayfam!</p>
        <button onclick="mesajVer()">Tıkla Bana!</button>
    </div>

    <script>
        // JavaScript: Etkileşim
        function mesajVer() {
            alert("Harika! İlk butonun çalışıyor.");
        }
    </script>

</body>
</html>
